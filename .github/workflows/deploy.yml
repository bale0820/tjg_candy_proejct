name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: JDK 설치
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 빌드
        run: |
          cd candy
          chmod +x gradlew
          ./gradlew build -x test

      - name: EC2로 전송
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "candy/build/libs/*.jar"
          target: "/home/ubuntu/candy/prod"

      - name: EC2에서 실행
        uses: appleboy/ssh-action@v0.1.6
        continue-on-error: true 
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            source ~/.bashrc
            source ~/.profile

            cd /home/ubuntu/candy/prod

            echo "=== DEBUG START ===="
            ps -ef | grep candy
            echo "=== DEBUG END ===="

            # 기존 서버 전부 종료
            ps -ef | grep '[j]ava -jar candy-0.0.1-SNAPSHOT.jar' | awk '{print $2}' | xargs -r kill
            sleep 3

            rm -f app.log

            nohup java -Xms256m -Xmx512m -jar candy-0.0.1-SNAPSHOT.jar > app.log 2>&1 &

            echo "DEPLOY SUCCESS"
