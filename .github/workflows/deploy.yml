name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: JDK 설치
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 빌드
        run: |
          cd candy
          chmod +x gradlew
          ./gradlew clean build -x test
          ls -al build/libs

      - name: JAR 이름 변경
        run: |
          cd candy/build/libs
          mv candy-0.0.1-SNAPSHOT.jar candy-${{ github.run_number }}.jar
          ls -al

      - name: EC2로 전송
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "candy/build/libs/candy-*.jar"
          target: "/home/ubuntu/candy/prod"
          strip_components: 3

      - name: EC2에서 실행
        uses: appleboy/ssh-action@v0.1.6
        continue-on-error: true 
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            source ~/.bashrc
            source ~/.profile

            cd /home/ubuntu/candy/prod

            LATEST_JAR=$(ls -t candy-*.jar | head -n 1)
            echo "LATEST: $LATEST_JAR"
            ln -sf $LATEST_JAR current.jar

            echo "=== SYSTEMD RESTART ====="

            sudo systemctl daemon-reload
            sudo systemctl restart candy

            

            echo "=== HEALTH CHECK ==="

            SUCCESS=false

            for i in {1..10}
            do
              sleep 2
              if curl -s http://localhost:8080/qwe/heal | grep "ok"; then
                echo "SERVER IS UP"
                SUCCESS=true
                break
              fi
              echo "WAITING..."
            done

            if [ "$SUCCESS" = false ]; then
              echo "DEPLOY FAILED"
              exit 1
            fi

            echo "DEPLOY SUCCESS"
