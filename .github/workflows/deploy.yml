name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: JDK 설치
        uses: actions/setup-java@v3
        with:
          java-version: '21'

      - name: 빌드
        run: |
          cd candy
          ./gradlew build

      - name: EC2로 전송
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "candy/build/libs/*.jar"
          target: "/home/ubuntu/candy/prod"

      - name: EC2에서 실행
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            pkill -f 'candy-0.0.1-SNAPSHOT.jar'
            nohup java -jar /home/ubuntu/candy/prod/candy-0.0.1-SNAPSHOT.jar > /home/ubuntu/candy/prod/app.log 2>&1 &
